<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Meaning of Tohi slide"><rect width="280" height="280" fill="#4187ed"/><rect x="0" y="118" width="190" height="76" fill="#fff"/><rect x="188" y="0" width="92" height="280" fill="#d1a436"/><text x="32" y="70" font-family="Arial, sans-serif" font-size="22" fill="white">Ecusta Tohi</text><text x="12" y="146" font-family="Arial, sans-serif" font-size="12" fill="#5f6562">Tohi refers to peace,</text><text x="12" y="164" font-family="Arial, sans-serif" font-size="12" fill="#5f6562">balance, wellness, and</text><text x="12" y="182" font-family="Arial, sans-serif" font-size="12" fill="#5f6562">harmony - like water flowing gently.</text><path d="M206 70 C222 95 254 98 266 136 C238 125 218 142 196 164" fill="none" stroke="#fffaf0" stroke-width="8" opacity=".65"/><circle cx="210" cy="160" r="20" fill="#f0d982"/><circle cx="210" cy="160" r="7" fill="#55361e"/></svg>