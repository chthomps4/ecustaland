<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Ecusta Tohi mission page"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#15231c"/><stop offset="1" stop-color="#52645a"/></linearGradient></defs><rect width="280" height="280" fill="url(#g)"/><rect y="235" width="280" height="28" fill="#888" opacity=".9"/><text x="22" y="78" font-family="Arial, sans-serif" font-size="16" fill="#fff">Our mission is to leverage</text><text x="22" y="100" font-family="Arial, sans-serif" font-size="16" fill="#fff">the power of the Native</text><text x="22" y="122" font-family="Arial, sans-serif" font-size="16" fill="#fff">American Sunflower for</text><text x="22" y="144" font-family="Arial, sans-serif" font-size="16" fill="#fff">environmental remediation.</text><text x="22" y="253" font-family="Arial, sans-serif" font-size="8" fill="#fff">There is an inseparable link between the land and the life it sustains</text><circle cx="238" cy="218" r="20" fill="#f0d982"/><circle cx="238" cy="218" r="7" fill="#55361e"/></svg>