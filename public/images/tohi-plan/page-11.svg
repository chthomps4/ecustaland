<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Conclusion slide"><rect width="140" height="280" fill="#f0d982"/><rect x="140" width="140" height="280" fill="#4187ed"/><rect x="140" y="16" width="140" height="36" fill="#777"/><text x="164" y="42" font-family="Arial" font-size="18" font-weight="700" fill="white">CONCLUSION</text><text x="154" y="90" font-family="Arial" font-size="14" fill="white">Doing nothing is</text><text x="154" y="112" font-family="Arial" font-size="14" fill="white">not an answer.</text><rect x="148" y="132" width="112" height="34" fill="#fff"/><text x="154" y="153" font-family="Arial" font-size="8" fill="#555">A message from ancestors.</text><rect x="142" y="190" width="136" height="24" fill="#6d6d6d"/><text x="148" y="206" font-family="Arial" font-size="9" font-weight="700" fill="white">WE MUST REMEDIATE THE LAND</text><g fill="#f0d982"><circle cx="28" cy="70" r="18"/><circle cx="72" cy="92" r="22"/><circle cx="110" cy="52" r="16"/><circle cx="54" cy="170" r="24"/><circle cx="105" cy="206" r="20"/></g><g fill="#55361e"><circle cx="28" cy="70" r="6"/><circle cx="72" cy="92" r="8"/><circle cx="110" cy="52" r="5"/><circle cx="54" cy="170" r="8"/><circle cx="105" cy="206" r="7"/></g></svg>