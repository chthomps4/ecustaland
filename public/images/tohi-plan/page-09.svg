<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Tourism slide"><rect width="280" height="126" fill="#4187ed"/><rect y="126" width="280" height="154" fill="#f8f8f4"/><circle cx="54" cy="82" r="48" fill="#55bce8"/><circle cx="42" cy="106" r="12" fill="#fff"/><circle cx="65" cy="110" r="10" fill="#fff"/><text x="156" y="48" font-family="Arial" font-size="24" fill="white">Tourism</text><text x="135" y="86" font-family="Arial" font-size="12" fill="white">White squirrels, waterfalls</text><text x="135" y="104" font-family="Arial" font-size="12" fill="white">and sunflower fields.</text><text x="102" y="150" font-family="Arial" font-size="10" fill="#555">- World&apos;s largest sunflower field</text><text x="102" y="170" font-family="Arial" font-size="10" fill="#555">- Ecusta Trail attraction</text><text x="102" y="190" font-family="Arial" font-size="10" fill="#555">- Wedding destination</text><text x="102" y="210" font-family="Arial" font-size="10" fill="#555">- Hotel rooms with mountain views</text><text x="102" y="230" font-family="Arial" font-size="10" fill="#555">- Boardwalk trails and pump track</text><path d="M32 62 C45 90 70 65 82 94" stroke="#fff" stroke-width="8" fill="none" opacity=".9"/></svg>