<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Environmental contaminants slide"><rect width="280" height="280" fill="#f7f7f4"/><rect width="280" height="92" fill="#4187ed"/><rect x="152" y="0" width="128" height="92" fill="#87b96d"/><text x="18" y="42" font-family="Arial, sans-serif" font-size="18" fill="white">Environmental</text><text x="18" y="66" font-family="Arial, sans-serif" font-size="18" fill="white">Contaminants</text><text x="18" y="126" font-family="Arial, sans-serif" font-size="10" fill="#555">The closure of the Ecusta Paper Mill</text><text x="18" y="144" font-family="Arial, sans-serif" font-size="10" fill="#555">left environmental challenges.</text><text x="18" y="162" font-family="Arial, sans-serif" font-size="10" fill="#555">The land and water remain at risk.</text><rect x="158" y="196" width="18" height="42" fill="#d84335"/><rect x="190" y="166" width="18" height="72" fill="#55bce8"/><rect x="222" y="114" width="18" height="124" fill="#d84335"/><rect x="252" y="128" width="18" height="110" fill="#55bce8"/><text x="150" y="256" font-family="Arial" font-size="8" fill="#555">Carbon</text><text x="188" y="256" font-family="Arial" font-size="8" fill="#555">Dioxin</text><text x="222" y="256" font-family="Arial" font-size="8" fill="#555">Lead</text><text x="250" y="256" font-family="Arial" font-size="8" fill="#555">Mercury</text><circle cx="206" cy="50" r="18" fill="#f0d982"/><circle cx="206" cy="50" r="7" fill="#55361e"/></svg>